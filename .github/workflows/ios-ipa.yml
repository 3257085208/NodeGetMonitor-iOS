name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app without signing
        run: |
          xcodebuild \
            -project NodeGetMonitor.xcodeproj \
            -scheme NodeGetMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/NodeGetMonitor.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            find build -name "*.app" -maxdepth 6 -print
            exit 1
          fi
          rm -rf Payload NodeGetMonitor-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry NodeGetMonitor-unsigned.ipa Payload
          ls -lh NodeGetMonitor-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NodeGetMonitor-unsigned-ipa
          path: NodeGetMonitor-unsigned.ipa
          if-no-files-found: error
