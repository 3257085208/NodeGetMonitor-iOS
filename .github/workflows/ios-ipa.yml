name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build iOS app without signing
        run: |
          set -o pipefail
          xcodebuild \
            -project NodeGetMonitor.xcodeproj \
            -scheme NodeGetMonitor \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee xcodebuild.log

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/NodeGetMonitor.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            find build -maxdepth 8 -name "*.app" -print
            exit 1
          fi
          rm -rf Payload NodeGetMonitor-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry NodeGetMonitor-unsigned.ipa Payload
          ls -lh NodeGetMonitor-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: NodeGetMonitor-unsigned-ipa
          path: NodeGetMonitor-unsigned.ipa
          if-no-files-found: error
